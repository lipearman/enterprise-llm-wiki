services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    command: python -m app.jobs.runner
    depends_on:
      - backend
