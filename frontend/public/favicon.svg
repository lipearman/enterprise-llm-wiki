<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#4F46E5"/>

  <!-- Neural network / brain icon -->
  <!-- Center node -->
  <circle cx="16" cy="16" r="3.2" fill="white"/>

  <!-- Corner nodes -->
  <circle cx="8"  cy="9"  r="2.2" fill="white" opacity="0.85"/>
  <circle cx="24" cy="9"  r="2.2" fill="white" opacity="0.85"/>
  <circle cx="8"  cy="23" r="2.2" fill="white" opacity="0.85"/>
  <circle cx="24" cy="23" r="2.2" fill="white" opacity="0.85"/>

  <!-- Mid nodes -->
  <circle cx="16" cy="7"  r="1.6" fill="white" opacity="0.7"/>
  <circle cx="16" cy="25" r="1.6" fill="white" opacity="0.7"/>

  <!-- Connections: center → corners -->
  <line x1="16" y1="16" x2="8"  y2="9"  stroke="white" stroke-width="1.4" opacity="0.55"/>
  <line x1="16" y1="16" x2="24" y2="9"  stroke="white" stroke-width="1.4" opacity="0.55"/>
  <line x1="16" y1="16" x2="8"  y2="23" stroke="white" stroke-width="1.4" opacity="0.55"/>
  <line x1="16" y1="16" x2="24" y2="23" stroke="white" stroke-width="1.4" opacity="0.55"/>

  <!-- Connections: center → top/bottom -->
  <line x1="16" y1="16" x2="16" y2="7"  stroke="white" stroke-width="1.4" opacity="0.55"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="white" stroke-width="1.4" opacity="0.55"/>

  <!-- Cross connections (top) -->
  <line x1="8"  y1="9"  x2="16" y2="7"  stroke="white" stroke-width="1"   opacity="0.3"/>
  <line x1="24" y1="9"  x2="16" y2="7"  stroke="white" stroke-width="1"   opacity="0.3"/>

  <!-- Cross connections (bottom) -->
  <line x1="8"  y1="23" x2="16" y2="25" stroke="white" stroke-width="1"   opacity="0.3"/>
  <line x1="24" y1="23" x2="16" y2="25" stroke="white" stroke-width="1"   opacity="0.3"/>
</svg>
